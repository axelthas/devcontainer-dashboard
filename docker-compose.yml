version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - '3000:3000'
    environment:
      HOST_HOSTNAME: ${HOSTNAME:-}
      WORKSPACE_ROOT: /bootstrap_workspaces
      PRESETS_FILE: /data/presets.json
      VSCODE_SSH_HOST: ${VSCODE_SSH_HOST:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME:-/root}/git.workspaces:/bootstrap_workspaces:rw
      - dashboard_data:/data
      # Operator hooks (optional): mount a local directory of executable .sh scripts.
      # Scripts run in alphabetical order before the server starts.
      # Example: - ${HOME}/my-dashboard-hooks:/docker-entrypoint.d:ro
    restart: unless-stopped

volumes:
  dashboard_data:
