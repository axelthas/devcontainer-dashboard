version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      HOST_HOSTNAME: ${HOSTNAME:-}
      WORKSPACE_ROOT: /bootstrap_workspaces
      PRESETS_FILE: /data/presets.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME:-/root}/git.workspaces:/bootstrap_workspaces:rw
      - dashboard_data:/data
    restart: unless-stopped

volumes:
  dashboard_data:
